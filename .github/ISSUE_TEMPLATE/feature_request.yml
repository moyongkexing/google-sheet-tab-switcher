name: Feature request
description: Suggest a scoped improvement.
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Google Sheets tab-switching problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: permissions
    attributes:
      label: Does this require new permissions?
      options:
        - 'No'
        - 'Yes'
        - 'Not sure'
    validations:
      required: true
