<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        line-height: 1.6;
      }

      body {
        margin: 0;
        background: Canvas;
        color: CanvasText;
      }

      main {
        box-sizing: border-box;
        max-width: 820px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 48px 20px 72px;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 40px;
      }

      a {
        color: LinkText;
      }

      nav a {
        font-size: 0.95rem;
      }

      h1 {
        line-height: 1.15;
      }

      code,
      pre {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
      }

      pre {
        overflow-x: auto;
        padding: 14px;
        border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <nav aria-label="Site">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
        <a href="{{ '/support/' | relative_url }}">Support</a>
        <a href="{{ '/store-listing/' | relative_url }}">Store Listing</a>
      </nav>
      {{ content }}
    </main>
  </body>
</html>
